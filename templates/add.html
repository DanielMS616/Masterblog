<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Add Blog Post</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <main class="page-container">
        <header class="page-header">
            <div>
                <h1>Add a New Blog Post</h1>

                <p class="page-description">
                    Enter the author, title, and content of your post.
                </p>
            </div>

            <a
                class="button"
                href="{{ url_for('index') }}"
            >
                Back to All Posts
            </a>
        </header>

        <!--
        The form sends a POST request to the Flask function add().
        The name attributes identify the submitted values inside
        request.form in app.py.
        -->
        <form method="POST" action="{{ url_for('add') }}">
            <div class="form-group">
                <label for="author">Author:</label>

                <input
                    type="text"
                    id="author"
                    name="author"
                    placeholder="Enter the author's name"
                    required
                >
            </div>

            <div class="form-group">
                <label for="title">Title:</label>

                <input
                    type="text"
                    id="title"
                    name="title"
                    placeholder="Enter the post title"
                    required
                >
            </div>

            <div class="form-group">
                <label for="content">Content:</label>

                <textarea
                    id="content"
                    name="content"
                    rows="8"
                    placeholder="Write your blog post here"
                    required
                ></textarea>
            </div>

            <button
                class="button button-primary"
                type="submit"
            >
                Add Post
            </button>
        </form>
    </main>
</body>
</html>
