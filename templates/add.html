<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Add Blog Post</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <main class="page-container">
        <header class="page-header">
            <div>
                <h1>Add a New Blog Post</h1>

                <p class="page-description">
                    Enter the post details and choose a category.
                </p>
            </div>

            <a
                class="button button-secondary"
                href="{{ url_for('index') }}"
            >
                Back to All Posts
            </a>
        </header>

        <!--
        The form sends a POST request to the Flask add() function.
        The name attributes become keys inside request.form.
        -->
        <form
            class="post-form"
            method="POST"
            action="{{ url_for('add') }}"
        >
            <div class="form-group">
                <label for="author">
                    Author:
                </label>

                <input
                    type="text"
                    id="author"
                    name="author"
                    placeholder="Enter the author's name"
                    required
                >
            </div>

            <div class="form-group">
                <label for="title">
                    Title:
                </label>

                <input
                    type="text"
                    id="title"
                    name="title"
                    placeholder="Enter the post title"
                    required
                >
            </div>

            <div class="form-group">
                <label for="category">
                    Category:
                </label>

                <!--
                Flask passes the available categories to this template.
                -->
                <select
                    id="category"
                    name="category"
                    required
                >
                    <option
                        value=""
                        disabled
                        selected
                    >
                        Choose a category
                    </option>

                    {% for category in categories %}
                        <option value="{{ category }}">
                            {{ category }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="content">
                    Content:
                </label>

                <textarea
                    id="content"
                    name="content"
                    rows="8"
                    placeholder="Write your blog post here"
                    required
                ></textarea>
            </div>

            <div class="form-actions">
                <button
                    class="button button-primary"
                    type="submit"
                >
                    Add Post
                </button>

                <a
                    class="button button-secondary"
                    href="{{ url_for('index') }}"
                >
                    Cancel
                </a>
            </div>
        </form>
    </main>
</body>
</html>
