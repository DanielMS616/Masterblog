<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Update Blog Post</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <main class="page-container">
        <header class="page-header">
            <div>
                <h1>Update Blog Post</h1>

                <p class="page-description">
                    Change the current post details.
                </p>
            </div>

            <a
                class="button button-secondary"
                href="{{ url_for('index') }}"
            >
                Back to All Posts
            </a>
        </header>

        <!--
        The current post ID is inserted into the update route.
        A post with ID 3 sends the form to /update/3.
        -->
        <form
            class="post-form"
            method="POST"
            action="{{ url_for(
                'update',
                post_id=post['id']
            ) }}"
        >
            <div class="form-group">
                <label for="author">
                    Author:
                </label>

                <!-- Display the current value inside the input. -->
                <input
                    type="text"
                    id="author"
                    name="author"
                    value="{{ post['author'] }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="title">
                    Title:
                </label>

                <input
                    type="text"
                    id="title"
                    name="title"
                    value="{{ post['title'] }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="category">
                    Category:
                </label>

                <!--
                The current category is marked as selected.
                Older posts without a category use Uncategorized.
                -->
                <select
                    id="category"
                    name="category"
                    required
                >
                    {% for category in categories %}
                        {% if category == post.get(
                            "category",
                            "Uncategorized"
                        ) %}
                            <option
                                value="{{ category }}"
                                selected
                            >
                                {{ category }}
                            </option>
                        {% else %}
                            <option value="{{ category }}">
                                {{ category }}
                            </option>
                        {% endif %}
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="content">
                    Content:
                </label>

                <!--
                Text areas store their value between the opening
                and closing tags, not inside a value attribute.
                -->
                <textarea
                    id="content"
                    name="content"
                    rows="8"
                    required
                >{{ post["content"] }}</textarea>
            </div>

            <div class="form-actions">
                <button
                    class="button button-primary"
                    type="submit"
                >
                    Update Post
                </button>

                <a
                    class="button button-secondary"
                    href="{{ url_for('index') }}"
                >
                    Cancel
                </a>
            </div>
        </form>
    </main>
</body>
</html>
