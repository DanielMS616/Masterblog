<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>My Flask Blog</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>

    <!--
    Jinja loops through the list named posts.
    Flask passes this list to the template in the index route.
    During each loop, post represents one blog-post dictionary.
    -->
    {% for post in posts %}
        <div class="post">
            <h2>{{ post["title"] }}</h2>

            <p>
                <em>Written by {{ post["author"] }}</em>
            </p>

            <p>{{ post["content"] }}</p>
        </div>
    {% endfor %}
</body>
</html>
