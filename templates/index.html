<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!--
    Makes the page responsive on smartphones and tablets.
    -->
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>My Flask Blog</title>

    <!--
    url_for("static", ...) creates the correct URL for files
    inside the static folder.
    -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <main class="page-container">
        <header class="page-header">
            <div>
                <h1>Welcome to My Flask Blog!</h1>

                <p class="page-description">
                    Read the latest posts or share a new story.
                </p>
            </div>

            <!--
            url_for("add") creates the URL for the Flask function add().
            Clicking this link opens the form for creating a new post.
            -->
            <a
                class="button button-primary"
                href="{{ url_for('add') }}"
            >
                Add New Post
            </a>
        </header>

        <section class="posts">
            <!--
            Flask passes the blog-post list to this template under
            the name "posts".

            During every loop iteration, "post" represents one
            dictionary from the JSON file.
            -->
            {% for post in posts %}
                <article class="post">
                    <header class="post-header">
                        <!--
                        The values are read from the current
                        blog-post dictionary.
                        -->
                        <h2>{{ post["title"] }}</h2>

                        <p class="post-author">
                            Written by {{ post["author"] }}
                        </p>
                    </header>

                    <p class="post-content">
                        {{ post["content"] }}
                    </p>

                    <footer class="post-actions">
                        <!--
                        The current post ID is inserted into the
                        dynamic update route.

                        For a post with ID 3, this creates /update/3.
                        -->
                        <a
                            class="button button-edit"
                            href="{{ url_for(
                                'update',
                                post_id=post['id']
                            ) }}"
                        >
                            Edit
                        </a>

                        <!--
                        The current post ID is inserted into the
                        dynamic delete route.

                        For a post with ID 3, this creates /delete/3.
                        -->
                        <a
                            class="button button-delete"
                            href="{{ url_for(
                                'delete',
                                post_id=post['id']
                            ) }}"
                        >
                            Delete
                        </a>
                    </footer>
                </article>

            {% else %}
                <!--
                Jinja executes this else block when the posts list
                is empty and the for-loop has no elements to display.
                -->
                <div class="empty-message">
                    <h2>No blog posts yet</h2>

                    <p>
                        Create the first post for your blog.
                    </p>

                    <a
                        class="button button-primary"
                        href="{{ url_for('add') }}"
                    >
                        Add First Post
                    </a>
                </div>
            {% endfor %}
        </section>
    </main>
</body>
</html>
